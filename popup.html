<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Task Manager</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div id="info-message-area" class="info-message" style="display: none;" role="status" aria-live="polite"></div>

        <div class="manager-link-container">
            <button id="open-manager-btn" class="neumorphic-btn" aria-label="Open Weekly Planner"><span class="icon">🗓️</span> PLANNER</button>
        </div>

        <div class="tabs" role="tablist">
            <button class="tab-link active" data-tab="today" role="tab" aria-selected="true" aria-controls="today">TODAY</button>
            <button class="tab-link" data-tab="display" role="tab" aria-selected="false" aria-controls="display">Display</button>
            <button class="tab-link" data-tab="add" role="tab" aria-selected="false" aria-controls="add">ADD</button>
        </div>

        <div id="today" class="tab-content active" role="tabpanel" aria-labelledby="today">
            <div id="today-task-list">
                <!-- Today's tasks will be listed here -->
                <p>No tasks scheduled for today.</p>
            </div>
        </div>

        <div id="display" class="tab-content" role="tabpanel" aria-labelledby="display">
            <div id="display-task-list">
                <!-- Tasks will be listed here -->
                <p>No active tasks. Add some in the ADD tab!</p>
            </div>
        </div>

        <div id="add" class="tab-content" role="tabpanel" aria-labelledby="add">
            <div class="add-task-form">
                <div class="form-group">
                    <label for="task-title">Title:</label>
                    <input type="text" id="task-title" class="neumorphic-input" placeholder="Enter task title" aria-required="true">
                </div>
                <div class="form-group">
                    <label for="task-url">URL (Optional):</label>
                    <input type="url" id="task-url" class="neumorphic-input" placeholder="Enter URL">
                </div>
                <div class="form-group">
                    <label>Priority:</label>
                    <div class="radio-group-modern">
                        <input type="radio" id="priority-someday" name="priority" value="SOMEDAY" checked>
                        <label for="priority-someday">🗓️ Someday</label>
                        <input type="radio" id="priority-important" name="priority" value="IMPORTANT">
                        <label for="priority-important">⭐ Important</label>
                        <input type="radio" id="priority-critical" name="priority" value="CRITICAL">
                        <label for="priority-critical">🔥 Critical</label>
                    </div>
                </div>
                <div class="form-group" id="task-deadline-group" style="display: none;">
                    <label for="task-deadline">Deadline (for Critical):</label>
                    <input type="date" id="task-deadline" class="neumorphic-input">
                </div>
                <div class="form-group">
                    <label>Type:</label>
                    <div class="radio-group-modern">
                        <input type="radio" id="type-home" name="type" value="home" checked>
                        <label for="type-home">🏠 Home</label>
                        <input type="radio" id="type-work" name="type" value="work">
                        <label for="type-work">💼 Work</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Energy:</label>
                    <div class="radio-group-modern horizontal">
                        <input type="radio" id="energy-low" name="energy" value="low" checked>
                        <label for="energy-low">🍃 Low</label>
                        <input type="radio" id="energy-high" name="energy" value="high">
                        <label for="energy-high">⚡ High</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="task-recurrence">Recurrence:</label>
                    <select id="task-recurrence" class="neumorphic-select">
                        <option value="">None</option>
                        <option value="daily">🔄 Daily</option>
                        <option value="weekly">🔄 Weekly</option>
                        <option value="monthly">🔄 Monthly</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="task-notes">Notes (Optional):</label>
                    <textarea id="task-notes" class="neumorphic-input" rows="3" placeholder="Add any details or context..."></textarea>
                </div>
                <button id="add-task-btn" class="neumorphic-btn">Add Task</button>
            </div>
        </div>

    </div>
    <script src="task_utils.js"></script>
    <script src="settings.js"></script>
    <script src="popup.js"></script>
</body>
</html>
